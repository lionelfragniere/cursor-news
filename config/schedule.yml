timezone: Europe/Zurich
slot_minutes: 60
default_duration_minutes: 8
target_words_min: 980
target_words_max: 1240

rotation:
  - key: suisse_romande
    label: Suisse romande
    language: fr
    prompt: "Bulletin centré Suisse romande: priorise Vaud, Genève, Fribourg, Neuchâtel, Jura, Berne francophone et les sujets romands qui touchent la vie publique, la santé, l'économie, les transports, l'éducation, l'environnement et la culture."

  - key: valais
    label: Valais
    language: fr
    prompt: "Bulletin centré Valais: priorise Sion, Martigny, Sierre, Monthey, le Chablais valaisan, le Haut-Valais, les communes, le canton, l'économie locale, les infrastructures, la montagne, le climat, la santé, l'énergie et la vie publique valaisanne."

  - key: suisse
    label: Suisse
    language: fr
    prompt: "Bulletin national suisse: explique les décisions fédérales, les cantons, l'économie, la santé, la sécurité, la recherche et les sujets qui peuvent influencer la Suisse romande."

  - key: international
    label: International
    language: fr
    prompt: "Bulletin international en français: sélectionne les grands faits mondiaux vraiment utiles à comprendre depuis la Suisse romande. Donne du contexte sans noyer l'auditeur dans les détails."

  - key: un_relevant
    label: UN / ONU
    language: en
    tts_voice: en-US-JennyNeural
    prompt: "English-language United Nations briefing: focus on UN agencies, humanitarian aid, human rights, global health, refugees, climate, peace and security, and multilateral diplomacy. Explain why each item matters for people following the UN system. Keep it clear, spoken, factual and non-sensational."

  - key: international_english
    label: International English
    language: en
    tts_voice: en-US-JennyNeural
    prompt: "English-language international briefing: focus on major global developments, United Nations relevance when present, diplomacy, humanitarian issues, economics, science, climate and public safety. Keep it clear, spoken and non-sensational."

  - key: security_world
    label: Situation sécuritaire mondiale
    language: fr
    prompt: "Bulletin de sécurité mondiale: couvre conflits, crises humanitaires, cybermenaces, terrorisme, tensions militaires, sécurité civile et risques géopolitiques. Reste factuel, prudent, proportionné et utile."
