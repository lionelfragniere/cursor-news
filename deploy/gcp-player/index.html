<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cursor News</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <img src="/logo.webp" alt="Cursor News" />
          <div>
            <p class="eyebrow">Suisse romande</p>
            <h1>Cursor News</h1>
            <nav class="nav-links" aria-label="Navigation principale">
              <a href="/">Direct</a>
              <a href="/archive.html">Archives</a>
              <a href="/privacy.html">Confidentialité</a>
            </nav>
          </div>
        </div>
        <div class="top-actions">
          <div class="status" id="data-status">Chargement...</div>
          <section class="audio-panel" aria-label="Audio Cursor News">
            <div class="mini-player" aria-label="Flash audio en cours">
              <div class="mini-player-copy">
                <span class="eyebrow">Flash en cours</span>
                <strong id="current-flash-label">Audio</strong>
              </div>
              <audio
                id="radio-player"
                controls
                loop
                preload="metadata"
                src="https://storage.googleapis.com/cursor-news-radio-20260517-audio/current/live.mp3"
              ></audio>
              <a id="bulletin-audio-link" href="https://storage.googleapis.com/cursor-news-radio-20260517-audio/current/live.mp3">MP3</a>
            </div>
            <details class="bulletins-drawer header-bulletins" aria-label="Bulletins audio par ton">
              <summary>
                <div>
                  <span class="eyebrow">Audio à la carte</span>
                  <strong>Écouter les derniers flashs par ton</strong>
                </div>
              </summary>
              <div class="bulletin-grid" id="bulletin-grid"></div>
            </details>
          </section>
        </div>
      </header>

      <details class="filters-drawer" aria-label="Filtres des actualités">
        <summary>
          <div>
            <span class="eyebrow">Filtres</span>
            <strong>Affiner les news affichées</strong>
          </div>
        </summary>
        <section class="filters">
          <div class="search-row">
            <label>
              <span>Recherche</span>
              <input id="search" type="search" placeholder="Sujet, lieu, source..." />
            </label>
            <label>
              <span>Région</span>
              <select id="region-filter"></select>
            </label>
            <label>
              <span>Période</span>
              <select id="date-filter">
                <option value="today">Aujourd'hui</option>
                <option value="24h" selected>24 dernières heures</option>
                <option value="7d">7 derniers jours</option>
                <option value="all">Tout l'historique</option>
              </select>
            </label>
            <label>
              <span>Source</span>
              <select id="source-filter"></select>
            </label>
            <label>
              <span>Tri</span>
              <select id="sort-filter">
                <option value="newest">Plus récent</option>
                <option value="romand">Focus romand</option>
                <option value="calm">Plus calme</option>
                <option value="alert">Plus tendu</option>
              </select>
            </label>
          </div>

          <div class="slider-row">
            <label class="slider">
              <span>Tension max <strong id="tension-value">10</strong></span>
              <input id="tension-filter" type="range" min="0" max="10" value="10" />
            </label>
            <label class="slider">
              <span>Focus romand <strong id="priority-value">0</strong></span>
              <input id="priority-filter" type="range" min="0" max="140" step="10" value="0" />
            </label>
            <label class="toggle">
              <input id="child-filter" type="checkbox" />
              <span>Adapté enfants</span>
            </label>
            <label class="toggle">
              <input id="english-filter" type="checkbox" />
              <span>Inclure anglais</span>
            </label>
            <label class="toggle">
              <input id="sports-filter" type="checkbox" checked />
              <span>Masquer sport</span>
            </label>
            <label class="toggle">
              <input id="read-filter" type="checkbox" checked />
              <span>Masquer lus</span>
            </label>
            <button id="reset-filters" type="button">Réinitialiser</button>
          </div>
        </section>
      </details>

      <section class="news-head">
        <div>
          <p class="eyebrow">News scrappées</p>
          <h2 id="result-title">Actualités</h2>
        </div>
      </section>

      <section class="news-list" id="news-list" aria-live="polite"></section>
    </main>
    <script src="/app.js?v=20260519-english-query"></script>
  </body>
</html>
